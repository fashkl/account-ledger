spring:
  application:
    name: account-ledger
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/account_ledger}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:superpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0

server:
  error:
    include-message: never
    include-binding-errors: never
