spring:
  application:
    name: account-ledger
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/account_ledger}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:superpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 10000
      max-lifetime: 1800000
      keepalive-time: 60000
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never
      include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
